<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="250" fill="url(#shine)"/>

  <!-- Arc trail (football motion path) -->
  <path d="M130 380 Q170 180 340 160" stroke="rgba(255,255,255,0.2)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M110 370 Q160 160 350 140" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Football -->
  <circle cx="345" cy="148" r="38" fill="white"/>
  <!-- Pentagon panels -->
  <polygon points="345,125 356,133 353,148 337,148 334,133" fill="#7c3aed" stroke="#4c1d95" stroke-width="1.5"/>
  <polygon points="335,158 345,165 355,158 352,145 338,145" fill="#8b5cf6" stroke="#4c1d95" stroke-width="1.5"/>
  <polygon points="325,140 333,148 330,160 318,155 320,143" fill="#a78bfa" stroke="#4c1d95" stroke-width="1.5"/>

  <!-- Dollar sign -->
  <text x="200" y="310" font-family="system-ui,sans-serif" font-size="160" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-10">$</text>

  <!-- B monogram (small, top right overlay) -->
  <text x="370" y="270" font-family="system-ui,sans-serif" font-size="90" font-weight="900" fill="white" text-anchor="middle" opacity="0.95">B</text>
</svg>
