<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="Banter — live betting in your group chat.">
  <title>{% block title %}Banter{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <a href="/" class="brand">
      <svg width="22" height="22" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="var(--accent)" stroke-width="2"/><path d="M10 20V8l10 6-10 6z" fill="var(--accent)"/></svg>
      <span>Banter</span>
    </a>
    <div class="nav-right">
      <a href="#commands" class="nav-link">Commands</a>
      <a href="{{ bot_url }}" class="btn-ghost">Open in Telegram</a>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>Banter</span>
    <span class="dot">·</span>
    <a href="{{ bot_url }}">Telegram</a>
    <span class="dot">·</span>
        <a href="https://github.com/Penivera/Bantr" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script src="/static/js/main.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
